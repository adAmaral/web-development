<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header><h1>PÁGINA DE LOGIN</h1></header>
    <fieldset><legend>CADASTRO DE USUÁRIO</legend>
      <form action="input" method="post">
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email"><br><br>
        <label for="senha">Senha:</label><br>
        <input type="password" id="senha" name="senha"><br><br>
        <input type="radio" id="masculino" name="genero" value="masculino">
        <label for="masculino">Masculino</label><br>
        <input type="radio" id="feminino" name="genero" value="feminino">
        <label for="feminino">Feminino</label><br>
        <input type="radio" id="outros" name="genero" value="outros">
        <label for="Outros">Outros</label><br><br>
        <textarea name="Biografia" id="idbiografia" rows="10" cols="30">Digite sua Biografia</textarea><br><br>
        <input type="checkbox" id="termos">
        <label for="checkbox">Eu li e aceito os termos de serviço.</label><br><br>
        <button type="submit">Cadastrar</button>
        <button type="reset">Limpar</button>
      </form>
    </fieldset>

  </form>
</body>
</html>
