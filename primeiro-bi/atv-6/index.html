<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>To-Do List</title>
</head>
<body>
    <div class="atvheader">
        <h1 class="atvtitle">ATIVIDADE TO-DO LIST</h1>
    </div>
    <div class="atvcontainer">
        <ul class="atvul">ATIVIDADES:
        </ul>
    </div>
    <div>
        <input type="text" class="atvinputTask" placeholder="Adicione nova Task">
        <button class="addTaskBtn">Adicionar</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
